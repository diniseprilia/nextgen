services:
  mongodb:
    image: mongo:7
    container_name: nextgen-mongodb
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - nextgen_mongodb_data:/data/db
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: nextgen-minio
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - nextgen_minio_data:/data
    restart: unless-stopped

volumes:
  nextgen_mongodb_data:
  nextgen_minio_data:
