<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NextGen — Login (Mockup)</title>
  <link rel="stylesheet" href="mockups.css" />
</head>
<body>
  <div class="ng-login">
    <aside class="ng-login-brand">
      <div class="ng-brand-lockup">
        <img src="../design-system/reference/icon-ninja.png" alt="" class="ng-brand-icon" />
        <span class="ng-wordmark">NextGen</span>
      </div>
      <div class="ng-login-hero">
        <h1>Start your rookie journey</h1>
        <p>The learning portal for Ninja Van rookies — master processes, take assessments, and climb the leaderboard.</p>
      </div>
      <img src="../design-system/reference/icon-ninja.png" alt="" class="ng-login-illustration" aria-hidden="true" />
    </aside>

    <main class="ng-login-form-panel">
      <div class="ng-login-card">
        <form action="dashboard.html">
          <h2>Glad to see you back!</h2>
          <p class="ng-login-sub">Don't have an account? <a href="#">Contact your Master to get onboarded</a></p>

          <div class="ng-field">
            <label class="ng-label" for="email">Email address <span class="ng-required">*</span></label>
            <input class="ng-input" type="email" id="email" value="dini@ninjavan.co" />
          </div>

          <div class="ng-field">
            <label class="ng-label" for="password">Password <span class="ng-required">*</span></label>
            <input class="ng-input" type="password" id="password" value="••••••••" />
          </div>

          <div class="ng-login-actions">
            <button type="submit" class="ng-btn ng-btn--brand ng-btn--pill" style="width:100%;">Login</button>
            <a href="#" class="ng-link-muted">Forgot your password?</a>
          </div>
        </form>
      </div>
    </main>
  </div>

  <nav class="mockup-banner">
    <span>Mockup:</span>
    <a href="index.html">Hub</a>
    <span class="active">Login</span>
    <a href="dashboard.html">Dashboard</a>
    <a href="team-board.html">Team Board</a>
  </nav>
</body>
</html>
